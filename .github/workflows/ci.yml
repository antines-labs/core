name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v6.5.0
        with:
          version: v2.11

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"
      - run: go test ./... -count=1 -race -shuffle=on -timeout=60s
