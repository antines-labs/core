version: "2"
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - revive
    - misspell
    - gosec
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
    gosec:
      excludes:
        - G115
        - G401
        - G402
        - G501
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party/
      - builtin/
formatters:
  enable:
    - gofumpt
  exclusions:
    generated: lax
    paths:
      - third_party/
      - builtin/
